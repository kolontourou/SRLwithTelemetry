username: admin
password: NokiaSrl1!
timeout: 10s

targets:
  spine1:
    address: spine1:57400
    skip-verify: true
    subscriptions:
      - srl-if-stats
      - srl-bgp
      - srl-system-performance
      - srl-routes
      - srl-net-instance
  spine2:
    address: spine2:57400
    skip-verify: true
    subscriptions:
      - srl-if-stats
      - srl-bgp
      - srl-system-performance
      - srl-routes
      - srl-net-instance
  leaf1:
    address: leaf1:57400
    skip-verify: true
    subscriptions:
      - srl-if-stats
      - srl-bgp
      - srl-system-performance
      - srl-routes
      - srl-net-instance
  leaf2:
    address: leaf2:57400
    skip-verify: true
    subscriptions:
      - srl-if-stats
      - srl-bgp
      - srl-system-performance
      - srl-routes
      - srl-net-instance
  leaf3:
    address: leaf3:57400
    skip-verify: true
    subscriptions:
      - srl-if-stats
      - srl-bgp
      - srl-system-performance
      - srl-routes
      - srl-net-instance

subscriptions:
  srl-system-performance:
    mode: stream
    stream-mode: sample
    sample-interval: 5s
    paths:
      - /platform/control[slot=*]/cpu[index=all]/total
      - /platform/control[slot=*]/memory
  srl-if-stats:
    mode: stream
    stream-mode: sample
    sample-interval: 5s
    paths:
      - /interface[name=ethernet-1/*]/oper-state
      - /interface[name=ethernet-1/*]/statistics
      - /interface[name=ethernet-1/*]/traffic-rate
  srl-routes:
    mode: stream
    stream-mode: sample
    sample-interval: 5s
    paths:
      - /network-instance[name=*]/route-table/ipv4-unicast/statistics/
  srl-bgp:
    mode: stream
    stream-mode: sample
    sample-interval: 5s
    paths:
      - /network-instance[name=*]/protocols/bgp/statistics
  srl-net-instance:
    mode: stream
    stream-mode: sample
    sample-interval: 5s
    paths:
      - /network-instance[name=*]/oper-state

outputs:
  prom-output:
    type: prometheus
    listen: :9273
    event-processors:
      - trim-prefixes
      - rename-srl-interface
      - oper-state-to-int

processors:
  trim-prefixes:
    event-strings:
      value-names:
        - "^/state/.*"
      transforms:
        - trim-prefix:
            apply-on: name
            prefix: /state/
  oper-state-to-int:
    event-strings:
      value-names:
        - ".*"
      transforms:
        - replace:
            apply-on: value
            old: up
            new: "1"
        - replace:
            apply-on: value
            old: down
            new: "0"
  rename-srl-interface:
    event-strings:
      tag-names:
        - "^interface_name"
      transforms:
        - replace:
            apply-on: value
            old: "ethernet-(\\d+)/(\\d+)"
            new: e$1-$2
